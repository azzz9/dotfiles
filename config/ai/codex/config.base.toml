model = "gpt-5.5"
model_reasoning_effort = "medium"
personality = "pragmatic"
approval_policy = "on-failure"
approvals_reviewer = "auto_review"
sandbox_mode = "workspace-write"
allow_login_shell = false

# SECURITY: network_access = true allows the sandboxed agent to make outbound
# network requests (package installs, API calls, git fetch, etc.). This is
# convenient for development but means a compromised or misbehaving agent can
# exfiltrate data. If you handle sensitive codebases, consider setting this to
# false and allowing specific hosts via a proxy or firewall rules.
[sandbox_workspace_write]
network_access = true

[notice]
"hide_gpt-5.1-codex-max_migration_prompt" = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"
"gpt-5.2-codex" = "gpt-5.4"
"gpt-5.3-codex" = "gpt-5.4"

[plugins."google-calendar@openai-curated"]
enabled = true

[tui.model_availability_nux]
"gpt-5.5" = 4
