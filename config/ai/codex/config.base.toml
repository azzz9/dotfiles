model = "gpt-5.5"
model_reasoning_effort = "medium"
personality = "pragmatic"
approval_policy = "on-request"
approvals_reviewer = "auto_review"
sandbox_mode = "workspace-write"
allow_login_shell = false
web_search = "cached"

[features]
guardian_approval = true

# SECURITY: network_access = false blocks the sandboxed agent from making
# outbound network requests (package installs, API calls, git fetch, etc.).
# This is the safer default: a compromised or misbehaving agent cannot
# exfiltrate data or fetch untrusted content. Set to true only when you need
# the agent to reach the network, and prefer allowing specific hosts via a
# proxy or firewall rules rather than opening access broadly.
[sandbox_workspace_write]
network_access = false

[notice]
"hide_gpt-5.1-codex-max_migration_prompt" = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"
"gpt-5.2-codex" = "gpt-5.4"
"gpt-5.3-codex" = "gpt-5.4"

[plugins."google-calendar@openai-curated"]
enabled = true

[tui.model_availability_nux]
"gpt-5.5" = 4
