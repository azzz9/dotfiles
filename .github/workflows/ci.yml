name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes

      # Optional: set CACHIX_AUTH_TOKEN in repo secrets to enable binary cache.
      # Without a token this step is skipped and builds use the public cache only.
      - name: Configure Cachix
        if: ${{ vars.CACHIX_NAME != '' }}
        uses: cachix/cachix-action@v16
        with:
          name: ${{ vars.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check shell scripts
        run: |
          bash -n scripts/setup-system.sh
          nix run nixpkgs#shellcheck -- scripts/setup-system.sh

      - name: Check GitHub Actions workflows
        run: nix run nixpkgs#actionlint -- .github/workflows/ci.yml

      - name: Check flake outputs
        run: nix flake check --no-build

      - name: Evaluate Home Manager configurations
        run: |
          nix eval --impure .#homeConfigurations.x86_64-linux.activationPackage.drvPath
          nix eval --impure .#homeConfigurations.aarch64-darwin.activationPackage.drvPath

  linux:
    name: Build x86_64-linux
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes

      - name: Configure Cachix
        if: ${{ vars.CACHIX_NAME != '' }}
        uses: cachix/cachix-action@v16
        with:
          name: ${{ vars.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: false

      - name: Build Home Manager activation package
        run: nix build --no-link --impure .#homeConfigurations.x86_64-linux.activationPackage

  macos:
    name: Build aarch64-darwin
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes

      - name: Configure Cachix
        if: ${{ vars.CACHIX_NAME != '' }}
        uses: cachix/cachix-action@v16
        with:
          name: ${{ vars.CACHIX_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: false

      - name: Build Home Manager activation package
        run: nix build --no-link --impure .#homeConfigurations.aarch64-darwin.activationPackage
